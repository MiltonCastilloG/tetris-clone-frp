<!doctype html>
<html lang="en">
  <head>
    <title>¡Tetris!</title>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <link rel="stylesheet" type="text/css" href="./assets/css/index.css" />
  </head>
  <body>
    <audio autoplay loop class="music">
      <source src="./assets/music/korobeiniki.mp3" type="audio/mpeg" />
    </audio>
    <div class="js-menu-container row-container">
      <div class="column-container">
        <button class="js-game-start-btn game-start-btn initial-btn">
          Play Game
        </button>
        <button class="js-load-btn load-btn initial-btn">
          Restore Game From Server
        </button>
        <input class="js-game-hash game-hash" style="visibility: hidden" />
        <button class="js-game-hash-btn" style="visibility: hidden">
          Restore
        </button>
        <p class="controls-help">
          <b>←</b> left <b>·</b> <b>→</b> right <b>·</b> <b>↓</b> soft drop <b>·</b> <b>↑</b> hard drop
        </p>
        <p class="controls-help">
          <b>A</b> rotate left <b>·</b> <b>S</b> rotate right <b>·</b> <b>D</b> hold <b>·</b> <b>Space</b> pause
        </p>
      </div>
    </div>
    <!-- MENU AND GAME CONTAINERS DIVISION -->
    <div class="js-game-container game-container" style="visibility: hidden">
      <div class="row-container game-layout">
        <aside class="side-rail">
          <div class="row-container panel-upcoming upcomming-tetrominoes-container">
            <div
              class="column-container js-upcomming-tetrominoes upcomming-tetrominoes"
            >
              <h3 class="panel-label">Upcoming</h3>
              <canvas
                class="js-upcomming-tetromino-queue upcomming-queue"
              ></canvas>
            </div>
          </div>
          <div class="row-container panel-hold hold-tetromino-container">
            <div class="column-container">
              <h3 class="panel-label">Hold</h3>
              <canvas class="js-hold-tetromino hold-tetromino"></canvas>
            </div>
          </div>
          <div class="row-container panel-controls pause-control-container">
            <div class="column-container game-controls-dock">
              <div class="mobile-control-tile">
                <button class="js-pause-btn board-btn pause-btn"></button>
              </div>
              <div class="mobile-control-tile">
                <button
                  class="js-upload-game-btn board-btn upload-game-btn"
                ></button>
              </div>
            </div>
          </div>
          <div class="row-container panel-score score-container">
            <div class="column-container">
              <h3 class="panel-label">Score:</h3>
              <h2 class="js-score score">0</h2>
              <h3 class="panel-label">Lines:</h3>
              <h2 class="js-lines-score score">0</h2>
            </div>
          </div>
        </aside>
        <canvas class="js-board board panel-board"></canvas>
      </div>
    </div>
    <script type="module" src="./assets/js/game-render/menu.js"></script>
  </body>
</html>
